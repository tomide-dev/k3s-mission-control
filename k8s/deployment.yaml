apiVersion: apps/v1
kind: Deployment
metadata:
  name: mission-control
  labels:
    app: mission-control
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mission-control
  template:
    metadata:
      labels:
        app: mission-control
    spec:
      containers:
        - name: mission-control
          image: tomidedev/k3s-mission-control:latest

          ports:
            - containerPort: 3000

          envFrom:
            - configMapRef:
                name: mission-control-config
            - secretRef:
                name: mission-control-secret

          volumeMounts:
            - name: app-storage
              mountPath: /app/data

          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"

      # ✅ ADD THIS BLOCK
      volumes:
        - name: app-storage
          persistentVolumeClaim:
            claimName: mission-control-pvc